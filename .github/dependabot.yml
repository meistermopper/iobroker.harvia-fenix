# Dependabot will run on day 10 of each month at 01:22 (Europe/Berlin timezone)
version: 2
updates:

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'cron'
      timezone: 'Europe/Berlin'
      cronjob: '22 1 10 * *'
    open-pull-requests-limit: 15
    assignees:
      - 'meistermopper'
    versioning-strategy: 'increase'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'cron'
      timezone: 'Europe/Berlin'
      cronjob: '22 1 10 * *'
    open-pull-requests-limit: 15
    assignees:
      - 'meistermopper'
